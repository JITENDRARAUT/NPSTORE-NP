<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Np Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"> <!-- For icons -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2rem;
        }
        header a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            margin-left: 1rem;
        }
        header a:hover {
            text-decoration: underline;
        }
        .signup-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin: auto;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .signup-container h2 {
            margin-bottom: 1.5rem;
            color: #667eea;
            font-size: 1.8rem;
        }
        .signup-container .input-group {
            position: relative;
            margin: 1rem 0;
        }
        .signup-container input {
            width: 100%;
            padding: 0.75rem 0.75rem 0.75rem 2.5rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        .signup-container input:focus {
            border-color: #667eea;
            outline: none;
        }
        .signup-container .input-group i {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
        }
        .signup-container button {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 0.75rem;
            width: 100%;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            margin-top: 1rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .signup-container button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .signup-container p {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .signup-container a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .signup-container a:hover {
            text-decoration: underline;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 1rem;
            margin-top: auto;
        }
        @media (max-width: 768px) {
            .signup-container {
                padding: 1.5rem;
                max-width: 90%;
            }
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-shoe-prints"></i> Np Store</h1>
        <a href="index.html"><i class="fas fa-home"></i> Back to Home</a>
    </header>
    <div class="signup-container">
        <h2>Join Np Store Today!</h2>
        <p>Create your account to start shopping for the best shoes.</p>
        <form onsubmit="handleSignup(event)">
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" placeholder="Full Name" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Confirm Password" required>
            </div>
            <button type="submit">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>
    <footer>
        <p>&copy; 2023 Np Store. All rights reserved.</p>
    </footer>
    <script>
        function handleSignup(event) {
            event.preventDefault();
            // Mock signup success - in a real app, validate and register user via API
            alert('Sign up successful! Redirecting to home...');
            window.location.href = 'index.html'; // Redirect to main page
        }
    </script>
</body>
</html>
